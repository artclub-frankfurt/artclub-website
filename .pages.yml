# Pages CMS configuration — defines the editor UI surfaced at app.pagescms.org.
# See https://pagescms.org/docs/configuration.
#
# Workflow: editors work on the `content-edits` branch (selected via the
# branch dropdown in the top-left of the Pages CMS UI — Pages CMS does not
# support setting a default working branch in this config file). A GitHub
# Action (.github/workflows/cms-pr.yml) opens / updates a PR to main on every
# push. The editor reviews the change on github.com and clicks "Squash and
# merge". Branch protection on main still applies, so this keeps the same
# review-before-publish posture as code PRs.

settings:
  commit:
    templates:
      create: "Add {filename}"
      update: "Update {filename}"
      delete: "Delete {filename}"
      rename: "Rename {filename} → {newFilename}"

# Default upload location for any field that doesn't override `options.path`.
# Per-field paths below override this when the image should sit alongside its .md.
media:
  # `output` is a literal path prefix — Pages CMS appends `/<filename>` itself.
  # Do NOT use `{filename}` here; it isn't substituted in this position and
  # gets written into content as a literal token (the CI break in #14/#15).
  - name: events_media
    label: Event images
    input: src/content/events
    output: "."
  - name: site_media
    label: Site images
    input: public/images
    output: /images

content:
  # ─────────────────────────────────────────────────────────────────────
  # Events — the high-frequency editorial surface.
  # ─────────────────────────────────────────────────────────────────────
  - name: events
    label: Events
    type: collection
    path: src/content/events
    # Auto-derive filename from date + title slug — matches the existing
    # convention (`2026-09-15-autumn-mixer.md`).
    filename: "{fields.date | date_format: 'yyyy-MM-dd'}-{fields.title | slugify}.md"
    # Columns + sort in the events list view inside the CMS.
    view:
      fields: [title, date, time, registrationClosed]
      primary: title
      sort: [date]
      default:
        order: desc
    fields:
      - name: title
        label: Title
        type: string
        required: true

      - name: date
        label: Event date
        type: date
        required: true
        # Pages CMS renders this as a calendar picker; "hello" can't be typed.

      - name: time
        label: Time
        type: string
        required: false
        description: "Optional. Display time, e.g. '5:30 PM'. Leave blank for date-only events."
        # Loose type so the editor can write '5:30 PM', '17:30', 'Doors at 7 PM' etc.

      - name: subtitle
        label: Subtitle
        type: string
        required: false
        description: "Optional. One-line venue/details, e.g. 'Frankfurt · Schirn Kunsthalle · Free for members'."

      - name: lumaUrl
        label: Luma URL
        type: string
        required: false
        description: "Optional. Leave blank to publish the event without a Register CTA. Paste the real Luma URL later when registration is ready and the button appears automatically."
        # Regex accepts empty OR a Luma URL, so unsetting the field passes validation.
        pattern:
          regex: "^(https://(lu\\.ma|luma\\.com)/.+)?$"
          message: "Must be a Luma event URL (https://lu.ma/... or https://luma.com/...) or empty."

      - name: registrationClosed
        label: Registration closed
        type: boolean
        required: false
        default: false
        description: "Tick to manually close registration before the event date. After the event date, registration closes automatically regardless of this flag."

      - name: coverImage
        label: Cover image
        type: image
        required: false
        description: "Optional. Drag-drop the event poster here. Goes alongside the .md."
        options:
          # `path` = the folder Pages CMS opens when browsing existing images.
          # The actual upload destination is determined by the events_media
          # entry at the top of this file.
          path: src/content/events
          extensions: [jpg, jpeg, png, webp]

      - name: coverImageAlt
        label: Cover image — alt text
        type: string
        required: false
        description: "Optional. One sentence describing what the image shows (read by screen readers; not visible). Skip if the image is purely decorative."

      - name: coverImageCredit
        label: Cover image — credit
        type: string
        required: false
        description: "Optional. Visible attribution shown below the image. Format: 'Artist, *Title*, Year. Photo: Source.'"

      - name: instagramPosts
        label: Instagram post URLs
        type: string
        list: true
        required: false
        description: "Optional. Add post URLs after the event happens — they render in the Photos grid on the event detail page."
        pattern:
          regex: "^https://(www\\.)?instagram\\.com/p/.+"
          message: "Must be an Instagram post URL (https://www.instagram.com/p/…)."

      - name: body
        label: Description
        type: rich-text
        required: false
        description: "Optional. The event's full description. Use the toolbar for bold, italic, headings, lists, links."

  # ─────────────────────────────────────────────────────────────────────
  # Site pages — three named markdown files. Lower frequency edits.
  # ─────────────────────────────────────────────────────────────────────
  - name: home_page
    label: Home page
    type: file
    path: src/content/site/home.md
    fields:
      - name: title
        label: Page title (browser tab)
        type: string
        required: false
        description: "Optional. Overrides the default 'Art Club Frankfurt' browser-tab title."
      - name: heroTitle
        label: Hero — main line
        type: string
        required: false
        description: "Big serif text overlaid on the campus photo."
      - name: heroSubtitle
        label: Hero — subtitle
        type: string
        required: false
        description: "Italic line below the hero title."
      - name: body
        label: About card body
        type: rich-text
        required: false
        description: "Short intro shown between the hero and the upcoming event. 1–3 sentences."

  - name: about_page
    label: About page
    type: file
    path: src/content/site/about.md
    fields:
      - name: title
        label: Page title (browser tab)
        type: string
        required: false
        description: "Optional. Overrides the default browser-tab title."
      - name: body
        label: About page body
        type: rich-text
        required: false
        description: "The page content. Headings + paragraphs render with the editorial type system."

  - name: contact_page
    label: Contact page
    type: file
    path: src/content/site/contact.md
    fields:
      - name: title
        label: Page title (browser tab)
        type: string
        required: false
        description: "Optional. Overrides the default browser-tab title."
      - name: body
        label: Contact page body
        type: rich-text
        required: false
        description: "Optional intro paragraph. Email and Instagram blocks render automatically below."
